server {
    listen 80;
    server_name _;

    root  /usr/share/nginx/html;
    index index.html;

    # Proxy the metrics REST API to the backend container
    location /admin/api/ {
        proxy_pass         http://proxy:8080/admin/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_read_timeout 30s;
    }

    # Also proxy Prometheus metrics through (optional, for debugging)
    location /metrics {
        proxy_pass http://proxy:8080/metrics;
    }

    # React SPA — all other paths serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    gzip on;
    gzip_types text/plain text/css application/javascript application/json;
}
